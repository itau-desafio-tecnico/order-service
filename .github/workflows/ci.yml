name: order-service CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: desafio-dev-order-service
  ECR_MIGRATION_REPOSITORY: desafio-dev-order-service-migration
  ECS_CLUSTER: desafio-dev-cluster
  ECS_SERVICE: order-service
  MIGRATION_TASK_FAMILY: desafio-dev-order-service-migration

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes com cobertura (gate 80%)
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Build e push da imagem de migration (Liquibase)
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_MIGRATION_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_MIGRATION_REPOSITORY:latest" ./db
          docker push "$REGISTRY/$ECR_MIGRATION_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_MIGRATION_REPOSITORY:latest"

      - name: Rodar migrations (Liquibase) no RDS
        run: |
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=desafio-dev-private-*" \
            --query "Subnets[].SubnetId" --output text | tr '\t' ',')
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=desafio-dev-ecs-tasks-sg" \
            --query "SecurityGroups[0].GroupId" --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$MIGRATION_TASK_FAMILY" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --query "tasks[0].taskArn" --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration falhou com exit code $EXIT_CODE"
            exit 1
          fi

      - name: Atualizar serviço ECS (novo deployment)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment
